<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>Form</title>
</head>
<body>
    <div class="main-container">
        <form action="/form" method="post">
        <div class="form-container">
        <div>
            <label for="firstname">
                First Name
                <input type="text" name="firstname" id="firstname" required>
            </label>
            <label for="lastname">
                Last Name
                <input type="text" name="lastname" id="lastname" required>
            </label>
        </div>
        <label for="fullname">
            Full Name
        <input type="text" name="fullname" id="fullname" required >
        </label>

        <div>
            <label for="educationstatus">
                Education Status
                <select name="lasteducation" id="educationstatus" required>
                    <option value=""></option>
                    <option value="highschool">High School</option>
                    <option value="bachelor">Bachelor</option>
                    <option value="master">Master</option>
                    <option value="phd">PHD</option>
                </select>
            </label>

<label>
  <input type="radio" name="materialstatus" value="Single"> Single
</label>
<label>
  <input type="radio" name="materialstatus" value="Married"> Married
</label>
        </div>

        <label for="message">
            Message
            
        </label>
        <textarea name="message" id="" rows="13"></textarea>

        <button type="submit">Submit</button>

        </div>
    </form>

    </div>

</body>
</html>
